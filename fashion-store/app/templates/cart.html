{% extends 'base.html' %}
{% block title %}Your Bag — DRAPE{% endblock %}

{% block content %}
<div class="cart-layout">
  <div>
    <h1 class="cart-title">Your Bag</h1>
    <div id="cart-items">
      <div class="empty-state">
        <div class="empty-icon">🛍️</div>
        <h3>Loading your bag…</h3>
      </div>
    </div>
  </div>
  <div>
    <div class="order-summary">
      <h3>Order Summary</h3>
      <div class="summary-row"><span>Subtotal</span><span id="s-subtotal">₹0</span></div>
      <div class="summary-row"><span>Shipping</span><span>Free</span></div>
      <div class="summary-row total"><span>Total</span><span id="s-total">₹0</span></div>
      <textarea class="address-field" id="shipping-address"
        placeholder="Enter your full shipping address…" rows="3"></textarea>
      <button class="checkout-btn" id="checkout-btn" onclick="placeOrder()">
        Place Order
      </button>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/cart.js') }}"></script>
{% endblock %}
