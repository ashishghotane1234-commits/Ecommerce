{% extends 'base.html' %}
{% block title %}Register — DRAPE{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Join DRAPE</h1>
    <p>Create your account and start shopping</p>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Your Name" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password <span style="color:var(--muted);font-size:0.75rem">(min 6 chars)</span></label>
      <input type="password" id="password" placeholder="••••••••" />
      <p class="form-error" id="reg-error"></p>
    </div>
    <button class="submit-btn" id="reg-btn" onclick="doRegister()">Create Account</button>
    <p class="auth-switch">Already have an account? <a href="/login">Sign in</a></p>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
